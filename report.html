{"source":{"uri":"features/catalogo.feature","data":"# language: pt\n\nFuncionalidade: Catalogo de cafés\n    Como um usuario da starbugs, eu quero ver o Catalogo de cafés na pagina principal\n    Para que eu possa escolher e saber mais sobre os produtos disponiveis.\n\nCenário: Acessar o catalogo de cafés na pagina principal\n\n    Quando acesso a pagina principal da starbugs\n    Então eu devo ver a lista de cafés disponiveis\n\nCenario: Iniciar a compra de um café\n\n    Dado que estou na pagina principal da starbugs\n        E que desejo comprar o seguinte produto:\n        | product  | Expresso Gelado| \n        | price    | R$ 9,99        |\n        | delivery | R$ 10,00       |\n    Quando inicio a compra desse item\n    Então devo ver a pagina de check out com os detalhes do produto\n        E o valor total da compra deve ser de \"R$ 19,99\"  \n\nCenario: Café indisponivel\n\n     Dado que estou na pagina principal da starbugs\n        E que desejo comprar o seguinte produto:\n        | product  | Expresso Cremoso | \n     Quando inicio a compra desse item\n     Então devo ver um popup informando que o produto esta indisponivel","mediaType":"text/x.cucumber.gherkin+plain"}},
{"source":{"uri":"features/cupom.feature","data":"# language: pt\n\nFuncionalidade: Uso de cupons no Checkout\n\n    Como um usuário do site de venda de cafés, Eu quero poder aplicar cupons de desconto na página de checkout\n    Para que eu possa obter reduções no preço de produtos, aumentando a satisfação com a minha experiência de compra.\n\n    Contexto:\n    \n    Dado que iniciei a compra do item:\n        | name     | Café com Leite |\n        | price    | R$ 19,99       |\n        | delivery | R$ 10,00       |\n        | total    | R$ 29,99       |\n \n    Cenário: Aplicar Desconto de 20%:\n    \n    Quando aplico o seguinte cupom:\"MEUCAFE\"\n    Entao o valor da compra deve ser atualizado para \"R$ 25,99\"\n\n\n    Cenário: Cupom Expirado:\n\n    Quando aplico o seguinte cupom:\"PROMO20\"\n        Entao devo ver a notificação de \"Cupom expirado!\"\n            E o valor final da compra deve permanecer o mesmo\n\n    Cenário:Cupom Inválido:\n\n    Quando aplico o seguinte cupom:\"PROMO100\"\n        Entao devo ver a notificação de \"Cupom inválido!\"\n            E o valor final da compra deve permanecer o mesmo","mediaType":"text/x.cucumber.gherkin+plain"}},
{"source":{"uri":"features/pedido.feature","data":"#language: pt\n\nFuncionalidade: Pedidos\n\nComo um usuario do site Starbugs, eu quero selecionar e comprar cafés \npara que eu possa receber os produtos em meu endereço e efetuar o pagamento na entrega\n\nCenario: Compra bem sucedida\n    Dado que estou na pagina principal da starbugs\n        E que iniciei a compra do item \"Expresso Tradicional\"\n    Quando faço a busca do segunte CEP: \"30840372\"\n        E informo os demais dados do endereço:\n        | Numero      | 1250      |\n        | Complemento | Apto 102  |\n        E escolho a forma de pagamento \"Cartão de Débito\"\n        E por fim finalizo a compra\n    Então sou redirecionado para pagina de confirmação de Pedido\n        E deve ser informado um prazo de entrega: \"20 min - 30 min\"","mediaType":"text/x.cucumber.gherkin+plain"}},
